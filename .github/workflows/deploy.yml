name: Deploy

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [develop, main]

permissions:
  contents: read

concurrency:
  group: deploy-${{ github.event.workflow_run.head_branch }}
  cancel-in-progress: false

jobs:
  deploy-dev:
    if: >-
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'push' &&
      github.event.workflow_run.head_branch == 'develop' &&
      github.event.workflow_run.actor.login != 'dependabot[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: development
    env:
      FIREBASE_SERVICE_ACCOUNT_DEV: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_DEV }}
    steps:
      - name: Skip notice when dev credentials are unavailable
        if: ${{ !startsWith(env.FIREBASE_SERVICE_ACCOUNT_DEV, '{') }}
        run: echo "::warning::Skipping dev deploy because FIREBASE_SERVICE_ACCOUNT_DEV is missing or not valid JSON."

      - name: Checkout
        if: ${{ startsWith(env.FIREBASE_SERVICE_ACCOUNT_DEV, '{') }}
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Setup Node
        if: ${{ startsWith(env.FIREBASE_SERVICE_ACCOUNT_DEV, '{') }}
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install root dependencies
        if: ${{ startsWith(env.FIREBASE_SERVICE_ACCOUNT_DEV, '{') }}
        run: npm ci

      - name: Install functions dependencies
        if: ${{ startsWith(env.FIREBASE_SERVICE_ACCOUNT_DEV, '{') }}
        run: npm --prefix functions ci

      - name: Authenticate to Google Cloud
        if: ${{ startsWith(env.FIREBASE_SERVICE_ACCOUNT_DEV, '{') }}
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ env.FIREBASE_SERVICE_ACCOUNT_DEV }}

      - name: Install Firebase CLI
        if: ${{ startsWith(env.FIREBASE_SERVICE_ACCOUNT_DEV, '{') }}
        run: npm install -g firebase-tools

      - name: Deploy to Firebase dev
        if: ${{ startsWith(env.FIREBASE_SERVICE_ACCOUNT_DEV, '{') }}
        run: npm run deploy:dev

  deploy-prod:
    if: >-
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'push' &&
      github.event.workflow_run.head_branch == 'main' &&
      github.event.workflow_run.actor.login != 'dependabot[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: production
    env:
      FIREBASE_SERVICE_ACCOUNT_PROD: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_PROD }}
    steps:
      - name: Skip notice when prod credentials are unavailable
        if: ${{ !startsWith(env.FIREBASE_SERVICE_ACCOUNT_PROD, '{') }}
        run: echo "::warning::Skipping prod deploy because FIREBASE_SERVICE_ACCOUNT_PROD is missing or not valid JSON."

      - name: Checkout
        if: ${{ startsWith(env.FIREBASE_SERVICE_ACCOUNT_PROD, '{') }}
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Setup Node
        if: ${{ startsWith(env.FIREBASE_SERVICE_ACCOUNT_PROD, '{') }}
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install root dependencies
        if: ${{ startsWith(env.FIREBASE_SERVICE_ACCOUNT_PROD, '{') }}
        run: npm ci

      - name: Install functions dependencies
        if: ${{ startsWith(env.FIREBASE_SERVICE_ACCOUNT_PROD, '{') }}
        run: npm --prefix functions ci

      - name: Authenticate to Google Cloud
        if: ${{ startsWith(env.FIREBASE_SERVICE_ACCOUNT_PROD, '{') }}
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ env.FIREBASE_SERVICE_ACCOUNT_PROD }}

      - name: Install Firebase CLI
        if: ${{ startsWith(env.FIREBASE_SERVICE_ACCOUNT_PROD, '{') }}
        run: npm install -g firebase-tools

      - name: Deploy to Firebase prod
        if: ${{ startsWith(env.FIREBASE_SERVICE_ACCOUNT_PROD, '{') }}
        run: npm run deploy:prod
